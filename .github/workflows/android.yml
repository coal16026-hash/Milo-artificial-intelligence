name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Official Gradle Wrapper
      run: |
        echo "--> Installing global gradle to generate wrapper..."
        sudo apt-get update && sudo apt-get install -y gradle
        
        echo "--> Generating clean gradlew files with required version 9.3.1..."
        gradle wrapper --gradle-version 9.3.1

    - name: Fix Permissions & Compile App
      run: |
        chmod +x gradlew
        
        # Inject standard fallback debug signing to bypass validation errors
        if [ -f "app/build.gradle.kts" ]; then
          sed -i '/buildTypes {/i \    signingConfigs { getByName("debug") { storeFile = file(System.getProperty("user.home") + "/.android/debug.keystore") } }' app/build.gradle.kts
        elif [ -f "app/build.gradle" ]; then
          sed -i '/buildTypes {/i \    signingConfigs { debug { storeFile file("~/.android/debug.keystore") } }' app/build.gradle
        fi
        
        # Compile without non-blocking caching
        ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*-debug.apk"
