name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Official Gradle Wrapper
      run: |
        echo "--> Installing global gradle to generate wrapper..."
        sudo apt-get update && sudo apt-get install -y gradle
        
        echo "--> Generating clean gradlew files with required version 9.3.1..."
        gradle wrapper --gradle-version 9.3.1
        
        echo "--> Verifying new environment files..."
        ls -la

    - name: Fix Permissions & Compile App
      run: |
        chmod +x gradlew
        # --no-daemon and --no-configuration-cache prevents the compiler engine from locking up
        ./gradlew assembleDebug --no-daemon --no-configuration-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*-debug.apk"
