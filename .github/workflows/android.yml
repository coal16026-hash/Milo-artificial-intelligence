name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Project Root and Build
      run: |
        # Search for the directory containing gradlew
        GRADLE_DIR=$(find . -name gradlew -exec dirname {} \+ | head -n 1)
        
        if [ -z "$GRADLE_DIR" ]; then
          echo "ERROR: gradlew file could not be found anywhere in this repository!"
          exit 1
        fi
        
        echo "Found Android project root in: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        # Grant permissions and compile
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*-debug.apk"
